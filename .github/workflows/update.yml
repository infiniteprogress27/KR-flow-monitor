name: auto-update-data
on:
  schedule:
    - cron: '30 0 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pdfplumber
      - run: python update_data.py
        env:
          ECOS_KEY: ${{ secrets.ECOS_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
      - name: commit and push
        run: |
          git config user.name "data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.js data_backup.json cfd_history.json
          git diff --cached --quiet || git commit -m "data update $(date +%F)"
          git pull --rebase -X theirs origin main || true
          git push
